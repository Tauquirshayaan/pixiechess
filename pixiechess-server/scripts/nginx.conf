# ════════════════════════════════════════════════════════════════════════════
#  Pixie Chess — nginx Reverse Proxy Configuration
#  Place at: /etc/nginx/sites-available/pixiechess
#  Enable with: ln -s /etc/nginx/sites-available/pixiechess /etc/nginx/sites-enabled/
#
#  For HTTPS (after pointing a domain to this IP):
#    sudo certbot --nginx -d yourdomain.com
# ════════════════════════════════════════════════════════════════════════════

# Rate limiting — protect the /api/calculate endpoint
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain once you have one.
    # Leave as _ to accept any hostname (IP-based access).
    server_name _;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/wasm;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static frontend assets (long cache) ──────────────────────────────
    location /assets/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API: calculate endpoint (rate limited, streaming-aware) ──────────
    location /api/calculate {
        limit_req zone=api burst=5 nodelay;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Critical for streaming (Server-Sent Events / NDJSON)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        chunked_transfer_encoding on;
    }

    # ── Other API endpoints ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── All other requests → Node.js (serves React SPA) ──────────────────
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check endpoint (for GCP uptime monitoring) ─────────────────
    location /health {
        access_log off;
        proxy_pass http://localhost:3000/health;
    }
}

# ════════════════════════════════════════════════════════════════════════════
